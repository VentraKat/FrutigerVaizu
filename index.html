<body>
  <div class="home"></div>
<div class="home2">
    <h1 style="color: #FFF;">Добро пожаловать в FrutigerVaizu!</h1>
    <p style="color: #FFF;">Нажмите кнопку, чтобы начать исследовать мир Frutiger Aero!</p>
    
    <button id="connect" class="button" onclick="connect_to_server()"><div id="loading" class="loading" style="display: none;"></div><div id="caption" class="caption">Начать</div></button>
    <div id="status" class="status" style="display: none;"></div>
</div>
</body>
<script>
function connect_to_server() {
document.getElementById('loading').style.display = "block";
document.getElementById('connect').disabled = true;

document.getElementById('caption').textContent = "Подключение...";
document.getElementById('status').style.display = "none";

setTimeout(() => {
  let error = "Connection not reasoned";
  console.error("Error: " + error);
  document.getElementById('loading').style.display = "none";
document.getElementById('connect').disabled = false;
document.getElementById('caption').textContent = "Начать";
document.getElementById('status').textContent = "Не удалось подключиться к серверу: " + error;
  document.getElementById('status').style.display = "block";
}, 2000);


}
  
</script>
